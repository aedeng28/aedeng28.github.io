<script>function getRandomRuleString() {
  // Helper to generate a unique, sorted string of random digits (0-8)
  const generateCondition = () => {
    const count = Math.floor(Math.random() * 9); // 0 to 8 neighbors
    const digits = new Set();
    while (digits.size < count) {
      digits.add(Math.floor(Math.random() * 9));
    }
    return Array.from(digits).sort().join('');
  };

  const b = generateCondition();
  const s = generateCondition();

  return `B${b}/S${s}`;
}</script>
