<!DOCTYPE html>
<html>
<head>
<title> continued fraction converter ig </title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="card">
    <h2>Decimal to Continued Fraction</h2>
    
    <label for="decInput">Type or Paste Number:</label>
    <input type="number" id="decInput" value="3.1415926535" step="any">

    <div class="output-box">
        <p><strong>Sequence:</strong> <span id="seqText"></span></p>
        <p><strong>Result Fraction:</strong> <span id="fracText"></span></p>
    </div>

    <h3>Convergents Table</h3>
    <table>
        <thead>
            <tr>
                <th>Step</th>
                <th>Fraction</th>
                <th>Decimal</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const input = document.getElementById('decInput');
    
    function process() {
        let val = parseFloat(input.value);
        if (isNaN(val)) return;

        let left = val;
        let seq = [];
        let limit = 15; 

        // Generate elements
        for (let i = 0; i < limit; i++) {
            let floor = Math.floor(left);
            seq.push(floor);
            let diff = left - floor;
            if (diff < 1e-9) break;
            left = 1 / diff;
        }

        document.getElementById('seqText').innerText = "[" + seq.join(", ") + "]";

        // Build convergents
        let p0 = 0, p1 = 1;
        let q0 = 1, q1 = 0;
        let rows = "";

        for (let i = 0; i < seq.length; i++) {
            let a = seq[i];
            let p = a * p1 + p0;
            let q = a * q1 + q0;
            
            rows += `<tr>
                <td>${i + 1}</td>
                <td><strong>${p} / ${q}</strong></td>
                <td>${(p / q).toFixed(7)}</td>
            </tr>`;

            p0 = p1; p1 = p;
            q0 = q1; q1 = q;
            
            if (i === seq.length - 1) {
                document.getElementById('fracText').innerText = `${p} / ${q}`;
            }
        }
        document.getElementById('tableBody').innerHTML = rows;
    }

    // Force run instantly and bind both text changes and arrow clicks
    input.addEventListener('input', process);
    process();
</script>

</body>
</html>
